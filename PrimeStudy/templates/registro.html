<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="shortcut icon" href="{{ url_for('static', filename='logoV1.png') }}" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeStudy | Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registro.css') }}">
</head>
<body>

    <div class="card">
        <div class="card-logo">PrimeStudy</div>
        <p class="card-subtitle">Registro</p>

        <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Seu nome">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="@email.com">
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <div class="password-container">
                <input type="password" id="senha" placeholder="•••••">
                <span class="toggle-password" id="toggleSenha">🐵</span>
            </div>
        </div>

        <div class="form-group">
            <label for="confirmar-senha">Confirmar senha</label>
            <div class="password-container">
                <input type="password" id="confirmar-senha" placeholder="•••••">
                <span class="toggle-password" id="toggleConfirmar">🐵</span>
            </div>
        </div>

        <p class="erro-msg" id="erroMsg"></p>

        <button class="btn-primary" id="btnCriar">Criar conta</button>

        <div class="divider">ou</div>

        <button class="btn-google" id="btnGoogle">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Cadastrar com Google
        </button>

        <div class="card-footer">
            Já tem uma conta? <a href="/login">Entrar</a>
        </div>
        <div class="card-footer">
            <a href="/home" class="btn-voltar">voltar</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey:            "{{ firebase_api_key }}",
            authDomain:        "{{ firebase_auth_domain }}",
            projectId:         "{{ firebase_project_id }}",
            storageBucket:     "{{ firebase_storage_bucket }}",
            messagingSenderId: "{{ firebase_messaging_sender_id }}",
            appId:             "{{ firebase_app_id }}"
        };

        const app      = initializeApp(firebaseConfig);
        const auth     = getAuth(app);
        const provider = new GoogleAuthProvider();
        const erroMsg  = document.getElementById('erroMsg');

        function mostrarErro(msg) {
            erroMsg.className = 'erro-msg erro';
            erroMsg.textContent = msg;
            erroMsg.style.display = 'block';
        }

        function mostrarSucesso(msg) {
            erroMsg.className = 'erro-msg sucesso';
            erroMsg.textContent = msg;
            erroMsg.style.display = 'block';
        }

        async function criarSessao(user) {
            const idToken = await user.getIdToken();
            const res = await fetch('/api/sessao', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken })
            });
            const data = await res.json();
            if (data.status === 'ok') {
                window.location.href = '/home';
            } else {
                mostrarErro('Erro ao criar sessão. Tente novamente.');
            }
        }

        // Registro com email e senha
        document.getElementById('btnCriar').addEventListener('click', async () => {
            const nome   = document.getElementById('nome').value.trim();
            const email  = document.getElementById('email').value.trim();
            const senha  = document.getElementById('senha').value;
            const conf   = document.getElementById('confirmar-senha').value;

            if (!nome)              { mostrarErro('Preencha seu nome.'); return; }
            if (!email)             { mostrarErro('Preencha seu email.'); return; }
            if (senha.length < 6)   { mostrarErro('A senha deve ter no mínimo 6 caracteres.'); return; }
            if (senha !== conf)     { mostrarErro('As senhas não coincidem.'); return; }

            try {
                const cred = await createUserWithEmailAndPassword(auth, email, senha);
                await updateProfile(cred.user, { displayName: nome });
                mostrarSucesso('Conta criada com sucesso!');
                await criarSessao(cred.user);
            } catch (e) {
                if (e.code === 'auth/email-already-in-use') {
                    mostrarErro('Este email já está cadastrado.');
                } else {
                    mostrarErro('Erro ao criar conta. Tente novamente.');
                }
            }
        });

        // Registro com Google
        document.getElementById('btnGoogle').addEventListener('click', async () => {
            try {
                const cred = await signInWithPopup(auth, provider);
                await criarSessao(cred.user);
            } catch (e) {
                mostrarErro('Erro ao cadastrar com Google.');
            }
        });

        // Toggle senhas
        function setupToggle(toggleId, inputId) {
            document.getElementById(toggleId).addEventListener('click', function () {
                const input = document.getElementById(inputId);
                const type  = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.textContent = type === 'password' ? '🐵' : '🙈';
            });
        }

        setupToggle('toggleSenha',    'senha');
        setupToggle('toggleConfirmar', 'confirmar-senha');
    </script>

</body>
</html>
