{% extends "home_base.html" %}

{% block titulo %}Matérias{% endblock %}
{% block titulo_pagina %}MATÉRIAS{% endblock %}

{% block estilos %}
<style>
        .content-area {
            flex-grow: 1;
            padding: 0 40px 40px 40px;
            overflow-y: auto;
        }

        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-track { background: transparent; }
        .content-area::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .materias-count { font-size: 13px; color: var(--color-text-muted); }
        .materias-count span { color: var(--color-text); font-weight: bold; }

        .materias-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .materia-card {
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .materia-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .materia-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.18);
            border-radius: 16px;
        }

        .materia-card > * { position: relative; z-index: 1; }

        .card-top {
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
        }

        .card-menu-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }

        .card-menu-btn:hover { color: #fff; }

        .card-nome {
            font-size: 17px;
            font-weight: bold;
            color: #fff;
            margin: 0 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-info { font-size: 12px; color: rgba(255,255,255,0.75); }

        .materia-card.add-card {
            background: transparent !important;
            border: 2px dashed var(--color-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .materia-card.add-card::before { display: none; }

        .materia-card.add-card:hover {
            border-color: var(--color-primary);
            transform: none;
            box-shadow: none;
        }

        .add-card-label {
            font-size: 13px;
            font-weight: bold;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .c-blue   { background: #2563eb; }
        .c-green  { background: #16a34a; }
        .c-red    { background: #dc2626; }
        .c-purple { background: #ca8a04; }
        .c-teal   { background: #0891b2; }
        .c-pink   { background: #db2777; }

        .modal-nova { display: none; }

        .modal-nova-content {
            background-color: var(--color-bg);
            padding: 36px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            border: 1px solid var(--color-border);
        }

        .modal-nova-content h2 { margin: 0 0 24px 0; font-size: 20px; letter-spacing: 1px; }

        .modal-field { margin-bottom: 16px; }

        .modal-field label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--color-text-muted);
            margin-bottom: 8px;
            font-weight: bold;
        }

        .modal-field input {
            width: 100%;
            background-color: #252525;
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--color-text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-field input:focus { border-color: var(--color-primary); }

        .cor-grid { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .cor-opcao {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: border-color 0.2s, transform 0.15s;
        }

        .cor-opcao:hover { transform: scale(1.15); }
        .cor-opcao.selecionada { border-color: #fff; }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-cancelar {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--color-text-muted);
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s, border-color 0.2s;
        }

        .btn-cancelar:hover { color: var(--color-text); border-color: #555; }

        .btn-criar {
            background-color: var(--color-primary);
            color: var(--color-text);
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
        }

        .btn-criar:hover { opacity: 0.85; }
</style>
{% endblock %}

{% block conteudo %}
        <div class="content-area">
            <div class="actions-bar">
                <p class="materias-count">Você tem <span id="totalMaterias">0</span> matéria(s)</p>
            </div>
            <div class="materias-grid" id="materiasGrid"></div>
        </div>

        <div id="modalNova" class="modal-overlay modal-nova">
            <div class="modal-nova-content">
                <h2>Nova Matéria</h2>
                <div class="modal-field">
                    <label>Nome da matéria</label>
                    <input type="text" id="inputNomeMateria" placeholder="Ex: Matemática" maxlength="30">
                </div>
                <div class="modal-field">
                    <label>Cor</label>
                    <div class="cor-grid" id="corGrid">
                        <div class="cor-opcao selecionada" data-cor="c-blue"   style="background:#2563eb"></div>
                        <div class="cor-opcao" data-cor="c-green"  style="background:#16a34a"></div>
                        <div class="cor-opcao" data-cor="c-red"    style="background:#dc2626"></div>
                        <div class="cor-opcao" data-cor="c-purple" style="background:#ca8a04"></div>
                        <div class="cor-opcao" data-cor="c-teal"   style="background:#0891b2"></div>
                        <div class="cor-opcao" data-cor="c-pink"   style="background:#db2777"></div>
                        <div class="cor-opcao" data-cor="c-gray"   style="background:#bdbdbd"></div>
                <div class="modal-actions">
                    <button class="btn-cancelar" id="btnCancelarNova">Cancelar</button>
                    <button class="btn-criar" id="btnCriarMateria">Criar</button>
                </div>
            </div>
        </div>
{% endblock %}

{% block scripts %}
    <script>
        let materias = [];
        let corSelecionada = 'c-blue';

        function renderGrid() {
            const grid = document.getElementById('materiasGrid');
            document.getElementById('totalMaterias').textContent = materias.length;
            grid.innerHTML = '';

            materias.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = `materia-card ${m.cor}`;
                card.innerHTML = `
                    <div class="card-top">
                        <button class="card-menu-btn" data-index="${i}" title="Remover">✕</button>
                    </div>
                    <div class="card-bottom">
                        <p class="card-nome">${m.nome}</p>
                        <span class="card-info">${m.estudos} estudo${m.estudos !== 1 ? 's' : ''}</span>
                    </div>
                `;
                grid.appendChild(card);
            });

            const addCard = document.createElement('div');
            addCard.className = 'materia-card add-card';
            addCard.innerHTML = `<span class="add-card-label">+ Nova Matéria</span>`;
            addCard.addEventListener('click', abrirModalNova);
            grid.appendChild(addCard);

            grid.querySelectorAll('.card-menu-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    materias.splice(parseInt(btn.dataset.index), 1);
                    renderGrid();
                });
            });
        }

        const modalNova = document.getElementById('modalNova');

        function abrirModalNova() {
            document.getElementById('inputNomeMateria').value = '';
            modalNova.style.display = 'flex';
        }

        document.getElementById('btnCancelarNova').addEventListener('click', () => modalNova.style.display = 'none');
        modalNova.addEventListener('click', e => { if (e.target === modalNova) modalNova.style.display = 'none'; });

        document.getElementById('corGrid').querySelectorAll('.cor-opcao').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.cor-opcao').forEach(x => x.classList.remove('selecionada'));
                el.classList.add('selecionada');
                corSelecionada = el.dataset.cor;
            });
        });

        document.getElementById('btnCriarMateria').addEventListener('click', () => {
            const nome = document.getElementById('inputNomeMateria').value.trim();
            if (!nome) { document.getElementById('inputNomeMateria').focus(); return; }
            materias.push({ nome, cor: corSelecionada, estudos: 0 });
            renderGrid();
            modalNova.style.display = 'none';
        });

        renderGrid();
    </script>
{% endblock %}
