<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="shortcut icon" href="{{ url_for('static', filename='logoV1.png') }}" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeStudy | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

    <div class="card">
        <div class="card-logo">PrimeStudy</div>
        <p class="card-subtitle">Login</p>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="@email.com">
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <div class="password-container" style="position: relative; display: flex; align-items: center;">
                <input type="password" id="senha" placeholder="•••••" style="width: 100%; padding-right: 40px;">
                <span class="toggle-password" id="toggleSenha" style="cursor: pointer; position: absolute; right: 10px; display: flex; align-items: center; color: #666; transition: color 0.2s;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </span>
            </div>
        </div>

        <div class="forgot-password">
            <a href="#" id="btnEsqueceuSenha">Esqueceu a senha?</a>
        </div>

        <p class="erro-msg" id="erroMsg"></p>

        <button class="btn-primary" id="btnEntrar">Entrar</button>

        <div class="divider">ou</div>

        <button class="btn-google" id="btnGoogle">
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Continuar com Google
        </button>

        <div class="card-footer">
            Não tem uma conta? <a href="/registro">Registre-se</a>
        </div>
        <div class="card-footer">
            <a href="/home" class="btn-voltar">voltar</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey:            "{{ firebase_api_key }}",
            authDomain:        "{{ firebase_auth_domain }}",
            projectId:         "{{ firebase_project_id }}",
            storageBucket:     "{{ firebase_storage_bucket }}",
            messagingSenderId: "{{ firebase_messaging_sender_id }}",
            appId:             "{{ firebase_app_id }}"
        };

        const app      = initializeApp(firebaseConfig);
        const auth     = getAuth(app);
        const provider = new GoogleAuthProvider();

        const erroMsg = document.getElementById('erroMsg');

        function mostrarErro(msg) {
            erroMsg.textContent = msg;
            erroMsg.style.display = 'block';
        }

        async function criarSessao(user) {
            const idToken = await user.getIdToken();
            const res = await fetch('/api/sessao', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken })
            });
            const data = await res.json();
            if (data.status === 'ok') {
                window.location.href = '/home';
            } else {
                mostrarErro('Erro ao criar sessão. Tente novamente.');
            }
        }

        // Login com email e senha
        document.getElementById('btnEntrar').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            if (!email || !senha) { mostrarErro('Preencha email e senha.'); return; }

            try {
                const cred = await signInWithEmailAndPassword(auth, email, senha);
                await criarSessao(cred.user);
            } catch (e) {
                mostrarErro('Email ou senha incorretos.');
            }
        });

        // Login com Google
        document.getElementById('btnGoogle').addEventListener('click', async () => {
            try {
                const cred = await signInWithPopup(auth, provider);
                await criarSessao(cred.user);
            } catch (e) {
                mostrarErro('Erro ao entrar com Google.');
            }
        });

        // Esqueceu a senha
        document.getElementById('btnEsqueceuSenha').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) { mostrarErro('Digite seu email para redefinir a senha.'); return; }
            try {
                await sendPasswordResetEmail(auth, email);
                erroMsg.style.color = '#4ade80';
                mostrarErro('Email de redefinição enviado!');
            } catch (e) {
                mostrarErro('Erro ao enviar email. Verifique o endereço.');
            }
        });

        const iconeOlhoAberto = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
        const iconeOlhoFechado = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
        const corOculta = "#666666";
        const corVisivel = "#4285F4";

        // Toggle senha
        document.getElementById('toggleSenha').addEventListener('click', function () {
            const inputField = document.getElementById('senha');
            
            if (inputField.type === "password") {
                inputField.type = "text";
                this.innerHTML = iconeOlhoAberto;
                this.style.color = corVisivel;
            } else {
                inputField.type = "password";
                this.innerHTML = iconeOlhoFechado;
                this.style.color = corOculta;
            }
        });
    </script>

</body>
</html>
