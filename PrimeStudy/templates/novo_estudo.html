{% extends "home_base.html" %}

{% block titulo %}Novo Estudo{% endblock %}
{% block titulo_pagina %}NOVO ESTUDO{% endblock %}

{% block estilos %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/novo_estudo.css') }}">
{% endblock %}

{% block conteudo %}
        <div class="center-area">
            <div class="novo-estudo">

                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📄</div>
                    <h3>Arraste seu PDF</h3>
                    <p>Apenas arquivos .pdf são aceitos</p>
                    <button type="button" class="btn-escolher" id="btnEscolher">Escolher arquivo</button>
                    <input type="file" id="inputArquivo" accept="application/pdf" style="display:none">
                </div>

                <div class="arquivo-selecionado" id="arquivoSelecionado">
                    <span>📄</span>
                    <span id="nomeArquivo"></span>
                    <button type="button" class="arquivo-remover" id="btnRemover">✕</button>
                </div>

                <span id="avisoGeral" style="color: #ff4d4d; font-size: 11px; margin-bottom: 20px; display: none; text-align: center; width: 100%; font-weight: bold;"></span>
                <input type="text" id="nomeEstudo" class="input-escuro" placeholder="Dê um nome para este estudo..." />
                <button class="btn-enviar" id="btnEnviar" disabled>Criar estudo</button>
            </div>
        </div>
{% endblock %}

{% block scripts %}
    <script>
        const uploadArea   = document.getElementById('uploadArea');
        const inputArquivo = document.getElementById('inputArquivo');
        const arquivoDiv   = document.getElementById('arquivoSelecionado');
        const nomeArquivo  = document.getElementById('nomeArquivo');
        const btnEnviar    = document.getElementById('btnEnviar');
        const opcoes       = document.querySelectorAll('.opcao');
        const opcoesGrid   = document.getElementById('opcoesGrid');
        const avisoGeral   = document.getElementById('avisoGeral');
        let timeoutAviso;

        function mostrarAviso(mensagem) {
            avisoGeral.textContent = mensagem;
            avisoGeral.style.display = 'block';
            clearTimeout(timeoutAviso);
            timeoutAviso = setTimeout(() => { avisoGeral.style.display = 'none'; }, 5000);
        }

        function validarFormulario() {
            const temArquivo = inputArquivo.files.length > 0;
            const temNome   = document.getElementById('nomeEstudo').value.trim() !== '';
            btnEnviar.disabled = !(temArquivo && temNome);
        }

        const MAX_OPCOES = 3;
        opcoes.forEach(opcao => {
            opcao.addEventListener('click', function () {
                const jaSelecionada = this.classList.contains('selecionada');
                const totalSelecionadas = document.querySelectorAll('.opcao.selecionada').length;

                if (jaSelecionada) {
                    this.classList.remove('selecionada');
                    if (document.querySelectorAll('.opcao.selecionada').length === 0) {
                        opcoesGrid.classList.remove('tem-selecao');
                    }
                } else {
                    if (totalSelecionadas >= MAX_OPCOES) {
                        mostrarAviso('Selecione no máximo 3 opções.');
                        return;
                    }
                    this.classList.add('selecionada');
                    opcoesGrid.classList.add('tem-selecao');
                }
                validarFormulario();
            });
        });

        document.getElementById('btnEscolher').addEventListener('click', e => {
            e.stopPropagation();
            inputArquivo.click();
        });

        inputArquivo.addEventListener('change', function () {
            const file = this.files[0];
            if (file) {
                if (file.type === 'application/pdf') {
                    selecionarArquivo(file);
                } else {
                    mostrarAviso("Apenas PDF são aceitos.");
                    this.value = '';
                    arquivoDiv.style.display = 'none';
                    validarFormulario();
                }
            }
        });

        document.getElementById('nomeEstudo').addEventListener('input', validarFormulario);

        uploadArea.addEventListener('dragover', e => { 
            e.preventDefault(); 
            uploadArea.classList.add('dragover'); 
        });

        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));

        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];

            if (file && file.type === 'application/pdf') {
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                inputArquivo.files = dataTransfer.files;
                selecionarArquivo(file);
            } else {
                mostrarAviso("Por favor, selecione apenas arquivos no formato PDF.");
            }
        });

        function selecionarArquivo(file) {
            nomeArquivo.textContent = file.name;
            arquivoDiv.style.display = 'flex';
            avisoGeral.style.display = 'none';
            validarFormulario();
        }

        document.getElementById('btnRemover').addEventListener('click', () => {
            inputArquivo.value = '';
            arquivoDiv.style.display = 'none';
            validarFormulario();
        });

        btnEnviar.addEventListener('click', async () => {
            const arquivo = inputArquivo.files[0];
            const opcoesSelecionadas = [...document.querySelectorAll('.opcao.selecionada')]
                .map(o => o.dataset.opcao);

            const arquivo = inputArquivo.files[0];
            const formData = new FormData();
            formData.append('arquivo', arquivo);
            formData.append('nome', document.getElementById('nomeEstudo').value);

            btnEnviar.disabled = true;
            btnEnviar.textContent = 'Processando...';

            try {
                const res = await fetch('/api/processar', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();

                if (!res.ok || data.status !== 'ok') {
                    mostrarAviso(data.mensagem || 'Erro ao processar o PDF.');
                    return;
                }

                window.location.href = data.redirect_url;
            } catch (error) {
                mostrarAviso('Erro de conexao. Tente novamente.');
            } finally {
                btnEnviar.disabled = false;
                btnEnviar.textContent = 'Enviar e Analisar';
            }
        });
    </script>
{% endblock %}
