{% extends "home_base.html" %}

{% block titulo %}Histórico{% endblock %}
{% block titulo_pagina %}HISTÓRICO{% endblock %}

{% block estilos %}
<style>
        .content-area {
            flex-grow: 1;
            padding: 0 40px 40px 40px;
            overflow-y: auto;
        }

        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-track { background: transparent; }
        .content-area::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        /* ── BARRA DE BUSCA ── */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .search-input {
            flex-grow: 1;
            background-color: #252525;
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 10px 16px;
            color: var(--color-text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input::placeholder { color: var(--color-text-muted); }
        .search-input:focus { border-color: var(--color-primary); }

        /* ── TABELA ── */
        .historico-table {
            width: 100%;
            border-collapse: collapse;
        }

        .historico-table thead tr {
            border-bottom: 1px solid var(--color-border);
        }

        .historico-table th {
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--color-text-muted);
            padding: 0 16px 12px 16px;
            font-weight: bold;
        }

        .historico-table tbody tr {
            border-bottom: 1px solid #222;
            transition: background-color 0.15s;
            cursor: pointer;
        }

        .historico-table tbody tr:hover {
            background-color: rgba(255,255,255,0.04);
        }

        .historico-table td {
            padding: 14px 16px;
            font-size: 14px;
            color: var(--color-text);
        }

        .td-nome { font-weight: bold; }

        .td-tipo {
            display: inline-block;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 3px 10px;
            border-radius: 50px;
            background-color: rgba(112, 23, 177, 0.15);
            color: var(--color-primary);
            border: 1px solid rgba(112, 23, 177, 0.3);
        }

        .td-materia { color: var(--color-text-muted); }
        .td-data { color: var(--color-text-muted); font-size: 13px; }

        .td-acao {
            text-align: right;
        }

        .btn-ver {
            background: none;
            border: 1px solid var(--color-border);
            color: var(--color-text-muted);
            padding: 5px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s, border-color 0.2s;
        }

        .btn-ver:hover { color: var(--color-text); border-color: #555; }

        /* vazio */
        .historico-vazio {
            text-align: center;
            padding: 60px 0;
            color: var(--color-text-muted);
            font-size: 14px;
        }
</style>
{% endblock %}

{% block conteudo %}
        <div class="content-area">
            <div class="search-bar">
                <input class="search-input" type="text" id="searchInput" placeholder="Buscar por nome ou matéria...">
            </div>

            <table class="historico-table">
                <thead>
                    <tr>
                        <th>Nome do estudo</th>
                        <th>Matéria</th>
                        <th>Última edição</th>
                    </tr>
                </thead>
                <tbody id="historicoBody">
                    <!-- Linhas geradas via JS -->
                </tbody>
            </table>

            <div class="historico-vazio" id="historicoVazio" style="display:none;">
                Nenhum estudo encontrado.
            </div>
        </div>
{% endblock %}

{% block scripts %}
    <script>
        // Dados simulados — substituir por dados do back-end futuramente
        const estudos = [];

        function parseData(d) {
            const [dia, mes, ano] = d.split('/');
            return new Date(ano, mes - 1, dia);
        }

        function renderTabela(filtro = '') {
            const body = document.getElementById('historicoBody');
            const vazio = document.getElementById('historicoVazio');
            const termo = filtro.toLowerCase();

            const filtrados = estudos
                .filter(e =>
                    e.nome.toLowerCase().includes(termo) ||
                    e.materia.toLowerCase().includes(termo)
                )
                .sort((a, b) => parseData(b.data) - parseData(a.data));

            body.innerHTML = '';

            if (filtrados.length === 0) {
                vazio.style.display = 'block';
                return;
            }

            vazio.style.display = 'none';

            filtrados.forEach(e => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="td-nome">${e.nome}</td>
                    <td class="td-materia">${e.materia}</td>
                    <td class="td-data">${e.data}</td>
                `;
                body.appendChild(tr);
            });
        }

        document.getElementById('searchInput').addEventListener('input', e => {
            renderTabela(e.target.value);
        });

        renderTabela();
    </script>
{% endblock %}
